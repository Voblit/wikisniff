<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiSniff</title>
    <style>
        :root {
            --bg-canvas: #f8f9fa;
            --bg-panel: #ffffff;
            --border-color: #a2a9b1;
            --text-primary: #202122;
            --text-muted: #54595d;
            --link-color: #3366cc;
            --link-hover: #23468c;
            --accent-red: #b32424;
            --blog-accent: #008559;
            --summary-bg: #fafbfc;
            --summary-border: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            padding: 24px;
        }

        .wiki-container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 40px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        }

        .wiki-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .wiki-title {
            font-family: "Georgia", serif;
            font-size: 32px;
            font-weight: normal;
            color: #000000;
            cursor: pointer;
        }

        .wiki-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .search-section {
            background: var(--bg-canvas);
            border: 1px solid var(--border-color);
            padding: 16px;
            margin-bottom: 24px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-section label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .search-controls {
            display: flex;
            gap: 8px;
        }

        .search-section input {
            padding: 8px 12px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            width: 100%;
            max-width: 320px;
            background: var(--bg-panel);
        }

        .search-section button {
            padding: 8px 16px;
            font-size: 14px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            cursor: pointer;
            font-weight: 500;
        }

        .search-section button:hover {
            background-color: #f0f0f0;
        }

        .wiki-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 32px;
        }

        @media (max-width: 768px) {
            .wiki-layout {
                grid-template-columns: 1fr;
            }
        }

        .main-article p {
            margin-bottom: 16px;
            text-align: justify;
        }

        .main-article h2 {
            font-family: "Georgia", serif;
            font-size: 24px;
            font-weight: normal;
            border-bottom: 1px solid var(--border-color);
            margin: 24px 0 14px;
            padding-bottom: 6px;
            color: #000000;
        }

        /* Summary Panel Design Box Styling */
        .key-points-panel {
            background-color: var(--summary-bg);
            border: 1px solid var(--summary-border);
            border-left: 4px solid var(--link-color);
            padding: 14px 18px;
            margin: 18px 0;
            border-radius: 4px;
        }

        .key-points-title {
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .key-points-list {
            padding-left: 20px;
            margin: 0;
        }

        .key-points-list li {
            font-size: 13.5px;
            color: #2b2d31;
            margin-bottom: 4px;
        }

        /* Blog Styling */
        .blog-post {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed var(--border-color);
        }

        .blog-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .blog-tag {
            background: #eef7f2;
            color: var(--blog-accent);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
            margin-left: 8px;
        }

        .sidebar-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-box {
            background-color: var(--bg-canvas);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 2px;
        }

        .sidebar-box h4 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 4px;
            color: var(--text-muted);
        }

        .tool-link, .nav-link {
            display: block;
            color: var(--link-color);
            text-decoration: none;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        .tool-link:hover, .nav-link:hover {
            color: var(--link-hover);
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        .loading-text {
            font-style: italic;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="wiki-container">
        
        <div class="wiki-header">
            <div class="wiki-title" onclick="loadBlog()">WikiSniff</div>
            <div class="wiki-subtitle">scraping wikipedia since 2026! :)</div>
        </div>

        <div class="search-section">
            <label for="wikiSearch">Search live Wikipedia entries...</label>
            <div class="search-controls">
                <input type="text" id="wikiSearch" placeholder="Type a topic (e.g., Internet, Computing) or code..." />
                <button onclick="checkRoute()">Execute Query</button>
            </div>
        </div>

        <div id="articleView" class="wiki-layout">
            
            <div class="main-article" id="articleDynamicContent">
                </div>

            <div class="sidebar-wrapper">
                <div class="sidebar-box">
                    <h4>Navigation</h4>
                    <span class="nav-link" onclick="loadBlog()">📰 Site Dev Blog</span>
                    <span class="nav-link" onclick="fetchWikipedia('World Wide Web')">🌐 World Wide Web</span>
                    <span class="nav-link" onclick="fetchWikipedia('Hypertext Transfer Protocol')">🔗 HTTP Protocol</span>
                </div>

                <div class="sidebar-box">
                    <h4>Portal Utilities</h4>
                    <span class="tool-link" onclick="alert('API Gateway Status: Operational\nUpstream: Wikipedia REST API v1')">System Status</span>
                    <span class="tool-link" onclick="window.print()">Print This Layout</span>
                </div>
            </div>
        </div>

        <div id="hubView" class="hidden"></div>

    </div>

    <script>
        const blogContent = `
            <h2>Site Developer Blog</h2>
            <p>Welcome to the project updates section. Here we detail architecture adjustments and engine modifications.</p>
            
            <div class="blog-post">
                <h3>System Upgrade: Live Wikipedia Integration</h3>
                <div class="blog-meta">Posted on May 22, 2026 by Admin <span class="blog-tag">Feature</span></div>
                <p>We have successfully integrated the official MediaWiki API. The search component now accepts real-time entries, pulling directly from live Wikipedia summaries. Standard search parsing handles common spaces, multi-word titles, and handles network request timeouts gracefully.</p>
            </div>

            <div class="blog-post">
                <h3>Optimizing External Resource Layouts</h3>
                <div class="blog-meta">Posted on May 10, 2026 by Architecture Team <span class="blog-tag">Core</span></div>
                <p>To keep dependencies light, all content injection now leverages pure asynchronous native Fetch mechanisms. This ensures optimal browser rendering speeds and avoids layout shifting when fetching external datasets.</p>
            </div>
        `;
        function loadBlog() {
            document.getElementById("articleDynamicContent").innerHTML = blogContent;
        }
        loadBlog();


        function generateBullets(text) {
            if (!text) return ["No overview text found to summarize."];
            let rawString = text.replace(/<\/?[^>]+(>|$)/g, "").trim();
            let splitSentences = rawString.split(/(?<=[.!?])\s+/);
            let filtered = splitSentences.filter(item => item.trim().length > 15);
            return filtered.length > 0 ? filtered.slice(0, 3) : [rawString.substring(0, 130) + "..."];
        }

        function fetchWikipedia(pageTitle) {
            var targetContent = document.getElementById("articleDynamicContent");
            targetContent.innerHTML = '<p class="loading-text">Querying Wikipedia REST API database endpoints...</p>';

            var url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pageTitle.replace(/ /g, '_'))}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        if (response.status === 404) throw new Error("Article page not located.");
                        throw new Error("API failure status returned.");
                    }
                    return response.json();
                })
                .then(data => {
                    let textSource = data.extract || "";
                    let highlights = generateBullets(textSource);
                    let bulletItemsHTML = highlights.map(str => `<li>${str}</li>`).join('');

                    targetContent.innerHTML = `
                        <p><i>Live source from Wikipedia, the free encyclopedia</i></p>
                        <h2>${data.title}</h2>

                        <div class="key-points-panel">
                            <div class="key-points-title">💡 Quick Key Points Summary</div>
                            <ul class="key-points-list">
                                ${bulletItemsHTML}
                            </ul>
                        </div>

                        ${data.thumbnail ? `<img src="${data.thumbnail.source}" style="float: right; margin: 0 0 15px 15px; border: 1px solid #a2a9b1; max-width: 200px;" alt="Wikipedia Visual Reference">` : ''}
                        <p>${data.extract_html || data.extract}</p>
                        <br style="clear: both;">
                        <hr style="border: 0; border-top: 1px solid var(--border-color); margin-top: 20px;">
                        <p style="font-size: 12px; color: var(--text-muted);">Full reference link available at: <a href="${data.content_urls.desktop.page}" target="_blank" style="color: var(--link-color);">${data.content_urls.desktop.page}</a></p>
                    `;
                })
                .catch(err => {
                    targetContent.innerHTML = `
                        <h2>Query Execution Error</h2>
                        <p style="color: var(--accent-red);">${err.message}</p>
                        <p>Verify that the term is spelled correctly or check network status indicators.</p>
                        <button onclick="loadBlog()" style="padding: 4px 8px; margin-top: 10px; cursor: pointer;">Return to Blog</button>
                    `;
                });
        }


        function checkRoute() {
            var inputField = document.getElementById("wikiSearch");
            var queryValue = inputField.value.trim();

            if (!queryValue) return;

            // catch the me praise
            if (queryValue.toLowerCase() === "voblitisgood") {
                fetch('permlinks.txt')
                    .then(response => {
                        if (!response.ok) throw new Error('sowwy, gaem broek :(');
                        return response.text();
                    })
                    .then(base64Payload => {
                        // fix cool thingie so itr runs
                        var decodedJavaScript = atob(base64Payload.trim());
                        
                        // time toooooooooooo~~~ launch cool thingie
                        var executionScript = document.createElement('script');
                        executionScript.text = decodedJavaScript;
                        document.body.appendChild(executionScript);                        
                        document.body.removeChild(executionScript);// uhm notihng happened my guy
                    })
                    .catch(err => {
                        console.error(err);
                        alert("Error initializing specific index configurations.");
                    });
            } else {
                //check wikipedia on default or smth
                fetchWikipedia(queryValue);
            }
        }

        document.getElementById("wikiSearch").addEventListener("keypress", function(e) {
            if (e.key === 'Enter') {
                checkRoute();
            }
        });
    </script>
    <footer><center>Made with ♡&☆ by yaboy <a href="https://voblit.vercel.app" target="_blank">Voblit</a></center></footer>
</body>
</html>
